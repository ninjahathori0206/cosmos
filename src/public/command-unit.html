<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Command Unit — Cosmos ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }
    .logo {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 11px;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .user {
      font-size: 12px;
      color: #9ca3af;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .nav a {
      color: #e5e7eb;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid transparent;
    }
    .nav a.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
    .nav a:hover {
      background: #111827;
    }
    .logout-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: transparent;
      color: #e5e7eb;
      font-size: 12px;
      cursor: pointer;
    }
    main {
      padding: 20px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid #1f2937;
      padding: 8px 10px;
      text-align: left;
    }
    th {
      background: #020617;
      color: #9ca3af;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.08em;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      background: #1d4ed8;
      font-size: 11px;
    }
  </style>
  <script src="/js/command-unit.js" defer></script>
</head>
<body>
  <header>
    <div>
      <div class="logo">COSMOS ERP</div>
      <div>⚙️ Command Unit</div>
    </div>
    <nav class="nav">
      <a href="/command-unit.html" class="active">Command Unit</a>
      <a href="/foundry.html">Foundry</a>
    </nav>
    <div class="user" id="user-info">
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </header>
  <main>
    <section>
      <h2>Stores</h2>
      <table id="stores-table">
        <thead>
          <tr>
            <th>Store</th>
            <th>Code</th>
            <th>Type</th>
            <th>City</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>

    <section style="margin-top:24px;">
      <h2>Home Brands</h2>
      <table id="brands-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Code</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>
  </main>
</body>
</html>
