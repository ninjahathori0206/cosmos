<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foundry — Cosmos ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #020617;
      --bg-panel: #0b1220;
      --bg-panel-soft: #0f172a;
      --line: #1e293b;
      --line-strong: #334155;
      --text: #e5e7eb;
      --text-muted: #94a3b8;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #f97373;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: linear-gradient(180deg, #111a2c 0%, #0e1727 100%);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .logo {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .user {
      font-size: 12px;
      color: var(--text-muted);
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .nav a {
      color: var(--text);
      text-decoration: none;
      padding: 7px 12px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid transparent;
      transition: background-color .15s ease, border-color .15s ease;
    }
    .nav a.active {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.25) inset;
    }
    .nav a:hover {
      background: #131d31;
      border-color: #1f2d49;
    }
    .logout-btn {
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s ease, background-color .15s ease;
    }
    .logout-btn:hover {
      background: #111827;
      border-color: #475569;
    }
    main {
      padding: 18px 20px 26px;
      display: grid;
      grid-template-columns: 1.4fr 2fr;
      gap: 20px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: .01em;
    }
    section {
      background: linear-gradient(180deg, var(--bg-panel-soft) 0%, var(--bg-panel) 100%);
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 15px 16px 16px;
      box-shadow: 0 8px 22px rgba(2, 6, 23, 0.25);
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
      color: #cbd5e1;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: #0b1526;
      color: var(--text);
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 9px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.18);
    }
    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background-color .15s ease, transform .06s ease;
    }
    button:hover {
      background: var(--primary-hover);
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #162238;
      padding: 6px 8px;
      text-align: left;
    }
    th {
      background: #0b1526;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
    }
    tbody tr:hover td {
      background: #0f1b2f;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      background: #1f2937;
    }
    .tag-green {
      background: #16a34a33;
      color: #4ade80;
    }
    .tag-blue {
      background: #1d4ed833;
      color: #60a5fa;
    }
    .error {
      font-size: 11px;
      color: var(--danger);
      min-height: 16px;
      margin-top: 4px;
    }
    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }
      header {
        flex-wrap: wrap;
        gap: 10px;
      }
    }
  </style>
  <script src="/cosmos-client-config.js"></script>
  <script src="/js/foundry.js" defer></script>
</head>
<body>
  <header>
    <div>
      <div class="logo">COSMOS ERP</div>
      <div>🔩 Foundry — Procurement</div>
    </div>
    <nav class="nav">
      <a href="/command-unit.html">Command Unit</a>
      <a href="/foundry.html" class="active">Foundry</a>
    </nav>
    <div class="user" id="foundry-user">
      <button class="logout-btn" id="foundry-logout-btn">Logout</button>
    </div>
  </header>
  <main>
    <section>
      <h2>New Purchase (Stage 1)</h2>
      <form id="purchase-form">
        <label for="pf-product">Product (product_id)</label>
        <input id="pf-product" name="product_id" type="number" placeholder="e.g. 1" required>

        <label for="pf-date">Purchase Date</label>
        <input id="pf-date" name="purchase_date" type="date" required>

        <label for="pf-rate">Purchase Rate (₹/unit)</label>
        <input id="pf-rate" name="purchase_rate" type="number" step="0.01" required>

        <label for="pf-qty">Quantity</label>
        <input id="pf-qty" name="quantity" type="number" required>

        <label for="pf-transport">Transport (₹)</label>
        <input id="pf-transport" name="transport_cost" type="number" step="0.01" value="0">

        <label for="pf-gst">GST % (e.g. 0.12)</label>
        <input id="pf-gst" name="gst_pct" type="number" step="0.01" value="0.12">

        <label for="pf-po">PO Reference</label>
        <input id="pf-po" name="po_reference" type="text" placeholder="PO number">

        <label for="pf-notes">Notes</label>
        <textarea id="pf-notes" name="notes" rows="2"></textarea>

        <label>Colour 1</label>
        <input id="pf-colour1-name" type="text" placeholder="Colour name" value="Black Gold">
        <input id="pf-colour1-code" type="text" placeholder="Code" value="BLKGLD">
        <input id="pf-colour1-qty" type="number" placeholder="Qty" value="80">

        <label>Colour 2</label>
        <input id="pf-colour2-name" type="text" placeholder="Colour name" value="Silver">
        <input id="pf-colour2-code" type="text" placeholder="Code" value="SLVR">
        <input id="pf-colour2-qty" type="number" placeholder="Qty" value="70">

        <div style="margin-top:8px;">
          <button id="pf-submit" type="submit">Save Purchase</button>
        </div>
        <div id="pf-error" class="error"></div>
      </form>
    </section>
    <section>
      <h2>Recent Purchases</h2>
      <table id="purchases-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Rate</th>
            <th>Expected Bill</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top:18px;">Suppliers</h2>
      <table id="suppliers-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Code</th>
            <th>City</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</body>
</html>
