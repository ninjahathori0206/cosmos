<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foundry — Cosmos ERP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: #0f172a;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }
    .logo {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 11px;
      text-transform: uppercase;
      color: #9ca3af;
    }
    .user {
      font-size: 12px;
      color: #9ca3af;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }
    .nav a {
      color: #e5e7eb;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid transparent;
    }
    .nav a.active {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
    .nav a:hover {
      background: #111827;
    }
    .logout-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      background: transparent;
      color: #e5e7eb;
      font-size: 12px;
      cursor: pointer;
    }
    main {
      padding: 16px 20px 24px;
      display: grid;
      grid-template-columns: 1.4fr 2fr;
      gap: 20px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    section {
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      padding: 14px 16px 16px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #1d4ed8;
    }
    button {
      padding: 7px 11px;
      border-radius: 8px;
      border: none;
      background: #1d4ed8;
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #111827;
      padding: 6px 8px;
      text-align: left;
    }
    th {
      background: #020617;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 10px;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      background: #1f2937;
    }
    .tag-green {
      background: #16a34a33;
      color: #4ade80;
    }
    .tag-blue {
      background: #1d4ed833;
      color: #60a5fa;
    }
    .error {
      font-size: 11px;
      color: #f97373;
      min-height: 16px;
      margin-top: 4px;
    }
  </style>
  <script src="/js/foundry.js" defer></script>
</head>
<body>
  <header>
    <div>
      <div class="logo">COSMOS ERP</div>
      <div>🔩 Foundry — Procurement</div>
    </div>
    <nav class="nav">
      <a href="/command-unit.html">Command Unit</a>
      <a href="/foundry.html" class="active">Foundry</a>
    </nav>
    <div class="user" id="foundry-user">
      <button class="logout-btn" id="foundry-logout-btn">Logout</button>
    </div>
  </header>
  <main>
    <section>
      <h2>New Purchase (Stage 1)</h2>
      <form id="purchase-form">
        <label for="pf-product">Product (product_id)</label>
        <input id="pf-product" name="product_id" type="number" placeholder="e.g. 1" required>

        <label for="pf-date">Purchase Date</label>
        <input id="pf-date" name="purchase_date" type="date" required>

        <label for="pf-rate">Purchase Rate (₹/unit)</label>
        <input id="pf-rate" name="purchase_rate" type="number" step="0.01" required>

        <label for="pf-qty">Quantity</label>
        <input id="pf-qty" name="quantity" type="number" required>

        <label for="pf-transport">Transport (₹)</label>
        <input id="pf-transport" name="transport_cost" type="number" step="0.01" value="0">

        <label for="pf-gst">GST % (e.g. 0.12)</label>
        <input id="pf-gst" name="gst_pct" type="number" step="0.01" value="0.12">

        <label for="pf-po">PO Reference</label>
        <input id="pf-po" name="po_reference" type="text" placeholder="PO number">

        <label for="pf-notes">Notes</label>
        <textarea id="pf-notes" name="notes" rows="2"></textarea>

        <label>Colour 1</label>
        <input id="pf-colour1-name" type="text" placeholder="Colour name" value="Black Gold">
        <input id="pf-colour1-code" type="text" placeholder="Code" value="BLKGLD">
        <input id="pf-colour1-qty" type="number" placeholder="Qty" value="80">

        <label>Colour 2</label>
        <input id="pf-colour2-name" type="text" placeholder="Colour name" value="Silver">
        <input id="pf-colour2-code" type="text" placeholder="Code" value="SLVR">
        <input id="pf-colour2-qty" type="number" placeholder="Qty" value="70">

        <div style="margin-top:8px;">
          <button id="pf-submit" type="submit">Save Purchase</button>
        </div>
        <div id="pf-error" class="error"></div>
      </form>
    </section>
    <section>
      <h2>Recent Purchases</h2>
      <table id="purchases-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Rate</th>
            <th>Expected Bill</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <h2 style="margin-top:18px;">Suppliers</h2>
      <table id="suppliers-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Code</th>
            <th>City</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
</body>
</html>
