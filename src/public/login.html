<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmos ERP — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 14px;
      padding: 24px 28px;
      box-shadow: 0 24px 80px rgba(15,23,42,0.9);
      width: 100%;
      max-width: 360px;
      border: 1px solid rgba(148,163,184,0.3);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }
    .sub {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    label {
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    .field {
      margin-bottom: 14px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #9ca3af;
      cursor: pointer;
      user-select: none;
    }
    .remember input {
      width: auto;
      margin: 0;
      cursor: pointer;
    }
    button {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .error {
      color: #f97373;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
  <!--COSMOS_CLIENT_CONFIG-->
  <script src="/js/login.js" defer></script>
</head>
<body>
  <div class="card">
    <h1>Cosmos ERP</h1>
    <div class="sub">Sign in to Command Unit</div>
    <form id="login-form" autocomplete="off" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" readonly required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="off" readonly required>
      </div>
      <label class="remember">
        <input id="login-remember-me" type="checkbox" name="remember">
        <span>Remember username and password on this device</span>
      </label>
      <button id="login-btn" type="submit">Sign in</button>
      <div id="error" class="error"></div>
    </form>
  </div>
</body>
</html>
